services:
  db:
    image: postgres:16-alpine
    container_name: buddy_script_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: buddy
      POSTGRES_PASSWORD: buddy
      POSTGRES_DB: buddy_script
    ports:
      - "5432:5432"
    volumes:
      - buddy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buddy -d buddy_script"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  buddy_pgdata:
